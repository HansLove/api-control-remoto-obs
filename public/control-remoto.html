<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OBS Remote</title>
  <style>
    :root{
      --bg:#0a0e14;
      --surface:rgba(18,26,38,.72);
      --surface2:rgba(0,0,0,.22);
      --text:#eaf1ff;
      --muted:#7a8ba8;
      --border:rgba(255,255,255,.08);
      --good:#27d17f;
      --warn:#f6c34a;
      --bad:#ff4d6d;
      --accent:#6aa9ff;
      --shadow: 0 8px 24px rgba(0,0,0,.4);
      --radius: 16px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;height:100%;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:12px;
      padding-bottom:88px;
      overflow-x:hidden;
    }
    .wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}

    /* ── Header ── */
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 4px 12px;
      border-bottom:1px solid var(--border);
      margin-bottom:4px;
    }
    .logo{font-size:15px;font-weight:800;letter-spacing:.3px;}
    .status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted);}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--warn);}
    .dot.ok{background:var(--good);}
    .dot.bad{background:var(--bad);}

    /* ── Cards ── */
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px;
      backdrop-filter:blur(8px);
    }
    .card-title{
      font-size:11px;font-weight:700;color:var(--muted);
      text-transform:uppercase;letter-spacing:.5px;
      margin-bottom:10px;
    }
    .label-xs{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}

    /* ── Buttons ── */
    .btn{
      width:100%;padding:14px 12px;
      border-radius:14px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);font-size:14px;font-weight:700;
      cursor:pointer;transition:transform .05s,background .15s;
    }
    .btn:active{transform:scale(.97);}
    .btn.primary{background:rgba(106,169,255,.18);border-color:rgba(106,169,255,.3);}
    .btn.good{background:rgba(39,209,127,.15);border-color:rgba(39,209,127,.25);}
    .btn.bad{background:rgba(255,77,109,.15);border-color:rgba(255,77,109,.25);}
    .btn.warn{background:rgba(246,195,74,.15);border-color:rgba(246,195,74,.25);}
    .btn.ghost{background:transparent;}
    .btn.danger{background:rgba(255,77,109,.1);border-color:rgba(255,77,109,.25);color:#ff6b85;}

    /* ── Inputs ── */
    .toast-row{display:flex;gap:8px;}
    .toast-row input,.ai-input{
      flex:1;padding:12px;border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);font-size:14px;outline:none;
    }
    .toast-row input::placeholder,.ai-input::placeholder{color:var(--muted);}
    .toast-row .btn{width:auto;padding:12px 16px;}

    /* ── Duration pills ── */
    .dur-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
    .dur-pill{font-size:11px !important;padding:4px 11px !important;border-radius:20px !important;font-weight:600;}
    .dur-pill.active{background:rgba(106,169,255,.25) !important;border-color:rgba(106,169,255,.55) !important;color:#7ab8ff !important;}

    /* ── AI response bubble ── */
    .response-box{
      display:none;
      margin-top:10px;
      padding:10px 12px;
      background:var(--surface2);
      border-radius:12px;
      border-left:2px solid rgba(106,169,255,.4);
      animation:fadeIn .25s ease;
    }
    .response-box.show{display:block;}
    .response-q{
      font-size:10.5px;color:var(--muted);font-weight:600;
      margin-bottom:5px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .response-a{font-size:13.5px;color:var(--text);line-height:1.5;}

    /* ── Chart last-result box ── */
    .chart-result-box{
      display:none;
      margin-top:8px;
      padding:9px 12px;
      background:var(--surface2);
      border-radius:12px;
      border-left:2px solid rgba(106,169,255,.3);
      animation:fadeIn .25s ease;
    }
    .chart-result-box.show{display:block;}
    .chart-result-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
    .chart-result-meta{font-size:11px;color:var(--muted);}

    /* ── Status line ── */
    .status-line{font-size:12px;color:var(--muted);margin-top:8px;min-height:16px;}
    .status-line.thinking{color:var(--accent);}
    .status-line.error{color:var(--bad);}

    /* ── Grids ── */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

    /* ── Reaction grid (big tactile) ── */
    .grid-react{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .btn-react{padding:18px 10px !important;font-size:15px !important;border-radius:16px !important;}

    /* ── Sequence ── */
    .seq-display{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;background:rgba(0,0,0,.2);
      border-radius:12px;margin-bottom:10px;
    }
    .seq-num{font-size:28px;font-weight:900;color:var(--accent);}
    .seq-info{flex:1;}
    .seq-name{font-size:12px;color:var(--muted);font-weight:600;}
    .seq-label{font-size:13px;font-weight:600;margin-top:2px;}

    /* ── Connection panel ── */
    .conn-panel{overflow:hidden;max-height:0;transition:max-height .2s ease;}
    .conn-panel.open{max-height:220px;}
    .conn-toggle{font-size:11px;color:var(--muted);cursor:pointer;text-align:center;padding:8px;}
    .conn-inner{padding:10px 0;}
    .conn-inner input{
      width:100%;padding:10px;border-radius:10px;
      border:1px solid var(--border);background:rgba(255,255,255,.04);
      color:var(--text);font-size:13px;outline:none;margin-bottom:8px;
    }
    .conn-inner .grid2{margin-top:4px;}

    /* ── Bottom dock ── */
    .dock{
      position:fixed;left:0;right:0;bottom:0;
      padding:10px 12px 16px;
      background:linear-gradient(to top,rgba(10,14,20,.98),rgba(10,14,20,.7));
      backdrop-filter:blur(10px);border-top:1px solid var(--border);
    }
    .dock-inner{max-width:480px;margin:0 auto;display:flex;gap:8px;}
    .dock-inner .btn{flex:1;padding:16px 12px;font-size:15px;border-radius:16px;}

    /* ── Toast notification ── */
    .ui-toast{
      position:fixed;left:50%;bottom:100px;transform:translateX(-50%);
      padding:10px 16px;background:rgba(18,26,38,.95);
      border:1px solid var(--border);border-radius:12px;
      font-size:13px;font-weight:600;opacity:0;transition:opacity .15s;
      pointer-events:none;z-index:100;white-space:nowrap;
    }
    .ui-toast.show{opacity:1;}

    @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
    @media(max-width:360px){.grid2,.grid3,.grid-react{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">📡 OBS Remote</div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <!-- ═══ 1. IA CHAT ═══ -->
  <div class="card">
    <div class="card-title">🤖 Pregunta a la IA</div>
    <div class="toast-row">
      <input id="aiQuestion" placeholder="Escribe una pregunta…" />
      <button class="btn primary" id="sendAiQuestion">Enviar</button>
    </div>
    <!-- Respuesta visible en el control -->
    <div id="aiResponseBox" class="response-box">
      <div class="response-q" id="aiResponseQ"></div>
      <div class="response-a" id="aiResponseA"></div>
    </div>
    <div id="aiStatus" class="status-line"></div>
  </div>

  <!-- ═══ 2. GRÁFICA IA ═══ -->
  <div class="card">
    <div class="card-title">📊 Gráfica IA</div>
    <div class="toast-row">
      <input id="chartTopic" placeholder="Ej: Top 5 países por PIB 2024…" />
      <button class="btn primary" id="sendChartReq">Generar</button>
    </div>
    <!-- Duración -->
    <div style="margin-top:10px;">
      <div class="label-xs">⏱ Duración en pantalla</div>
      <div class="dur-row">
        <button class="btn dur-pill" data-dur="15000">15 s</button>
        <button class="btn dur-pill" data-dur="30000">30 s</button>
        <button class="btn dur-pill" data-dur="60000">1 min</button>
        <button class="btn dur-pill" data-dur="180000">3 min</button>
        <button class="btn dur-pill active" data-dur="0">∞ Siempre</button>
      </div>
    </div>
    <!-- Último resultado -->
    <div id="chartResultBox" class="chart-result-box">
      <div class="chart-result-title" id="chartResultTitle"></div>
      <div class="chart-result-meta" id="chartResultMeta"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
      <button class="btn danger" id="hideChart" style="width:auto;padding:6px 12px;font-size:12px;border-radius:10px;">✕ Cerrar overlay</button>
      <div id="chartStatus" class="status-line" style="margin-top:0;flex:1;"></div>
    </div>
  </div>

  <!-- ═══ 3. ESCRITOS ═══ -->
  <div class="card">
    <div class="card-title">✍️ Escritos</div>
    <div class="grid2" id="escritosGrid"></div>
    <div style="height:8px"></div>
    <div class="toast-row">
      <input id="customText" placeholder="Texto custom…" />
      <button class="btn ghost" id="sendCustomText">Mostrar</button>
    </div>
  </div>

  <!-- ═══ 4. REACCIONES ═══ -->
  <div class="card">
    <div class="card-title">🎉 Reacciones</div>
    <div class="grid-react">
      <button class="btn good btn-react" data-trigger="applause">👏 Aplausos</button>
      <button class="btn warn btn-react" data-trigger="highlight">🔥 Highlight</button>
      <button class="btn btn-react"      data-trigger="funny">😂 Funny</button>
      <button class="btn warn btn-react" data-trigger="wtf">😳 WTF</button>
      <button class="btn bad btn-react"  data-trigger="disagree">❌ Disagree</button>
      <button class="btn ghost btn-react" data-trigger="keypoint">🧠 Key Point</button>
    </div>
  </div>

  <!-- ═══ 5. MENSAJE RÁPIDO ═══ -->
  <div class="card">
    <div class="card-title">💬 Mensaje rápido</div>
    <div class="toast-row">
      <input id="toastMsg" placeholder="Escribe un mensaje…" />
      <button class="btn primary" id="sendToast">Enviar</button>
    </div>
  </div>

  <!-- ═══ 6. SEQUENCE ═══ -->
  <div class="card">
    <div class="card-title">🎬 Sequence</div>
    <div class="seq-display">
      <div class="seq-num" id="seqNum">—</div>
      <div class="seq-info">
        <div class="seq-name" id="seqName">TOP 5</div>
        <div class="seq-label" id="seqLabel">Click Next to start</div>
      </div>
    </div>
    <div class="grid3">
      <button class="btn primary" id="seqNext">▶ Next</button>
      <button class="btn ghost"   id="seqBack">↩ Back</button>
      <button class="btn ghost"   id="seqReset">⟲ Reset</button>
    </div>
  </div>

  <!-- ═══ 7. SPOILER ═══ -->
  <div class="card">
    <div class="card-title">⚠️ Spoiler Level</div>
    <div class="grid3">
      <button class="btn good" data-spoiler="safe">🔒 Safe</button>
      <button class="btn warn" data-spoiler="light">⚠️ Light</button>
      <button class="btn bad"  data-spoiler="full">☠️ Full</button>
    </div>
  </div>

  <!-- ═══ 8. CONNECTION ═══ -->
  <div class="conn-toggle" id="connToggle">⚙️ Connection Settings</div>
  <div class="conn-panel" id="connPanel">
    <div class="conn-inner">
      <input id="wsUrl" placeholder="wss://rocky-tundra-25941-27be30b007f7.herokuapp.com" />
      <input id="token" placeholder="Token (default: elias123)" />
      <div class="grid2">
        <button class="btn primary" id="connectBtn">Connect</button>
        <button class="btn ghost"   id="disconnectBtn">Disconnect</button>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<!-- Bottom Dock -->
<div class="dock">
  <div class="dock-inner">
    <button class="btn good"    id="bigApplause">👏 Aplausos</button>
    <button class="btn warn"    id="bigHighlight">🔥 Highlight</button>
    <button class="btn primary" id="bigNext">⏭️ Next</button>
  </div>
</div>

<div class="ui-toast" id="toast"></div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  // ═══ CONFIG ═══
  const DEFAULT_TOKEN = "elias123";
  const FRASES = [
    "Amor y amistad",
    "Feliz día del amor",
    "Gracias por estar",
    "Vibe coding con corazón",
    "Pensamientos que unen",
    "Celebramos juntos",
    "Con cariño",
    "La amistad es amor elegido"
  ];

  // ═══ State ═══
  const state = {
    ws: null,
    connected: false,
    seq: { name: "top5", step: 0, max: 5, label: "" }
  };
  const SETTINGS_KEY = "obs_remote_v2";

  // ═══ URL auto-detect ═══
  function isOnServer() {
    return location.protocol !== "file:" && location.hostname !== "localhost";
  }
  function getAutoWsUrl() {
    if (isOnServer()) {
      return `${location.protocol === "https:" ? "wss:" : "ws:"}//${location.host}`;
    }
    return null;
  }
  function getDefaultToken() {
    return isOnServer() ? DEFAULT_TOKEN : "";
  }

  // ═══ UI helpers ═══
  function toast(msg, duration = 1200) {
    const el = $("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove("show"), duration);
  }

  function setStatus(ok, text) {
    $("dot").className = "dot " + (ok ? "ok" : "bad");
    $("statusText").textContent = text;
  }

  function setStatusLine(elId, text, type = "") {
    const el = $(elId);
    if (!el) return;
    el.textContent = text;
    el.className = "status-line" + (type ? " " + type : "");
  }

  function updateSeqDisplay() {
    const { step, max, name, label } = state.seq;
    const numEl   = $("seqNum");
    const lblEl   = $("seqLabel");
    const nameEl  = $("seqName");
    if (!numEl || !lblEl || !nameEl) return;
    if (step === 0) {
      numEl.textContent = "—";
      lblEl.textContent = "Click Next to start";
    } else {
      const display = name === "top5" ? `#${max - step + 1}` : step;
      numEl.textContent = display;
      lblEl.textContent = label || `Step ${step} of ${max}`;
    }
    nameEl.textContent = name.toUpperCase().replace("TOP5", "TOP 5");
  }

  // ═══ Settings ═══
  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
      if (s.wsUrl && $("wsUrl")) $("wsUrl").value = s.wsUrl;
      if (s.token && $("token"))  $("token").value  = s.token;
    } catch (_) {}
  }
  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        wsUrl: $("wsUrl")?.value?.trim() || "",
        token: $("token")?.value?.trim()  || ""
      }));
    } catch (_) {}
  }

  // ═══ WebSocket ═══
  function connect(url, token) {
    if (state.ws) state.ws.close();

    let wsUrl = url || $("wsUrl").value.trim() || getAutoWsUrl();
    const wsToken = token ?? $("token").value.trim();

    if (!wsUrl) {
      setStatus(false, "No URL");
      $("connPanel").classList.add("open");
      return;
    }
    if (wsToken) {
      wsUrl += (wsUrl.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(wsToken);
    }

    try {
      state.ws = new WebSocket(wsUrl);
      setStatus(false, "Connecting…");

      state.ws.onopen = () => {
        state.connected = true;
        setStatus(true, "Connected");
        toast("✓ Connected");
        saveSettings();
      };

      state.ws.onclose = (e) => {
        state.connected = false;
        if (e.code === 1008) {
          setStatus(false, "Auth Failed");
          toast("Token inválido", 2000);
          $("connPanel").classList.add("open");
        } else {
          setStatus(false, "Disconnected");
        }
      };

      state.ws.onerror = () => {
        state.connected = false;
        setStatus(false, "Error");
      };

      state.ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === "ack") toast("✓ Enviado");

          // ── IA Q&A ──
          if (msg.type === "ai_thinking") {
            setStatusLine("aiStatus", "🧠 Claude está pensando…", "thinking");
          }
          if (msg.type === "ai_response") {
            setStatusLine("aiStatus", "");
            // Show response in the control
            const box = $("aiResponseBox");
            const qEl = $("aiResponseQ");
            const aEl = $("aiResponseA");
            if (box && qEl && aEl) {
              qEl.textContent = msg.question || "";
              aEl.textContent = msg.answer   || "";
              box.classList.add("show");
            }
          }

          // ── Gráfica IA ──
          if (msg.type === "chart_thinking") {
            setStatusLine("chartStatus", "📊 Generando gráfica…", "thinking");
          }
          if (msg.type === "chart_data") {
            setStatusLine("chartStatus", "");
            const box   = $("chartResultBox");
            const title = $("chartResultTitle");
            const meta  = $("chartResultMeta");
            if (box && title && meta) {
              title.textContent = msg.title || "Gráfica en overlay";
              const n    = (msg.labels || []).length;
              const dur  = msg.duration === 0 ? "∞ Siempre" :
                           msg.duration >= 60000 ? (msg.duration/60000).toFixed(0)+"min" :
                           (msg.duration/1000)+"s";
              meta.textContent = `${n} categorías · ${msg.theme || "neon"} · ${dur}`;
              box.classList.add("show");
            }
          }
          if (msg.type === "chart_error") {
            setStatusLine("chartStatus", "❌ " + (msg.message || "Error"), "error");
          }
        } catch {}
      };

    } catch {
      setStatus(false, "Failed");
    }
  }

  function send(payload) {
    if (state.ws?.readyState === 1) {
      state.ws.send(JSON.stringify({ ts: new Date().toISOString(), ...payload }));
    } else {
      toast("Sin conexión", 1500);
    }
  }

  // ═══ Actions ═══
  function sendToast() {
    const msg = $("toastMsg")?.value?.trim();
    if (!msg) return toast("Escribe un mensaje");
    send({ type: "toast", toast: { message: msg, variant: "info", durationMs: 2500 } });
    $("toastMsg").value = "";
  }

  function sendMarker(trigger) {
    send({ type: "marker", trigger, label: trigger });
    toast(trigger);
  }

  function sendSpoiler(level) {
    send({ type: "spoiler", level });
    toast(`Spoiler: ${level}`);
  }

  function seqNext() {
    if (state.seq.step < state.seq.max) state.seq.step++;
    else state.seq.step = 1;
    updateSeqDisplay();
    send({ type: "sequence", action: "next", seq: state.seq });
  }
  function seqBack() {
    if (state.seq.step > 1) state.seq.step--;
    updateSeqDisplay();
    send({ type: "sequence", action: "back", seq: state.seq });
  }
  function seqReset() {
    state.seq.step = 0;
    updateSeqDisplay();
    send({ type: "sequence", action: "reset", seq: state.seq });
  }

  function sendScenePhrase(phraseId) { send({ type: "scene", phraseId }); }
  function sendSceneText(text)       { send({ type: "scene", text: text.trim() }); }

  // ═══ Wire ═══
  function wire() {

    // ── Escritos ──
    const escritosGrid = $("escritosGrid");
    if (escritosGrid) {
      FRASES.forEach((texto, i) => {
        const btn = document.createElement("button");
        btn.className = "btn ghost";
        btn.textContent = texto.length > 18 ? texto.slice(0, 18) + "…" : texto;
        btn.onclick = () => { sendScenePhrase(i); toast(texto.slice(0,20)); };
        escritosGrid.appendChild(btn);
      });
    }
    $("sendCustomText")?.addEventListener("click", () => {
      const v = $("customText")?.value?.trim();
      if (v) { sendSceneText(v); $("customText").value = ""; }
      else toast("Escribe un texto");
    });

    // ── Duration pills ──
    let chartDuration = 0;
    document.querySelectorAll(".dur-pill").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".dur-pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        chartDuration = parseInt(btn.dataset.dur, 10);
      };
    });

    // ── Gráfica IA ──
    function sendChartRequest() {
      const t = $("chartTopic")?.value?.trim();
      if (!t) return toast("Escribe un tema para la gráfica");
      send({ type: "chart_ai_request", topic: t, duration: chartDuration });
      $("chartTopic").value = "";
      // Clear old result
      $("chartResultBox")?.classList.remove("show");
      const durLabel = chartDuration === 0 ? "permanente"
        : chartDuration >= 60000 ? (chartDuration/60000).toFixed(0)+"min"
        : (chartDuration/1000)+"s";
      setStatusLine("chartStatus", `⏳ Generando… (${durLabel})`, "thinking");
    }
    $("sendChartReq")?.addEventListener("click", sendChartRequest);
    $("chartTopic")?.addEventListener("keydown", e => { if (e.key === "Enter") sendChartRequest(); });
    $("hideChart")?.addEventListener("click", () => {
      send({ type: "chart_hide" });
      $("chartResultBox")?.classList.remove("show");
      setStatusLine("chartStatus", "");
      toast("Overlay cerrado");
    });

    // ── IA Pregunta ──
    function sendAiQuestion() {
      const q = $("aiQuestion")?.value?.trim();
      if (!q) return toast("Escribe una pregunta");
      send({ type: "ai_question", text: q });
      $("aiQuestion").value = "";
      // Clear old response
      $("aiResponseBox")?.classList.remove("show");
      setStatusLine("aiStatus", "⏳ Enviando…", "thinking");
    }
    $("sendAiQuestion")?.addEventListener("click", sendAiQuestion);
    $("aiQuestion")?.addEventListener("keydown", e => { if (e.key === "Enter") sendAiQuestion(); });

    // ── Reacciones ──
    document.querySelectorAll("[data-trigger]").forEach(btn => {
      btn.onclick = () => sendMarker(btn.dataset.trigger);
    });

    // ── Mensaje rápido ──
    $("sendToast")?.addEventListener("click", sendToast);
    $("toastMsg")?.addEventListener("keydown", e => { if (e.key === "Enter") sendToast(); });

    // ── Spoilers ──
    document.querySelectorAll("[data-spoiler]").forEach(btn => {
      btn.onclick = () => sendSpoiler(btn.dataset.spoiler);
    });

    // ── Sequence ──
    $("seqNext")?.addEventListener("click", seqNext);
    $("seqBack")?.addEventListener("click", seqBack);
    $("seqReset")?.addEventListener("click", seqReset);

    // ── Dock ──
    $("bigApplause")?.addEventListener("click",  () => sendMarker("applause"));
    $("bigHighlight")?.addEventListener("click", () => sendMarker("highlight"));
    $("bigNext")?.addEventListener("click",      () => sendMarker("next_segment"));

    // ── Connection ──
    $("connToggle")?.addEventListener("click", () => $("connPanel")?.classList.toggle("open"));
    $("connectBtn")?.addEventListener("click", () => connect());
    $("disconnectBtn")?.addEventListener("click", () => {
      state.ws?.close();
      setStatus(false, "Disconnected");
    });
    $("wsUrl")?.addEventListener("change", saveSettings);
    $("token")?.addEventListener("change", saveSettings);
  }

  // ═══ Boot ═══
  loadSettings();
  wire();
  updateSeqDisplay();

  const autoUrl = getAutoWsUrl();
  if (autoUrl) {
    const token = $("token").value.trim() || getDefaultToken();
    if (!$("token").value.trim() && token) $("token").value = token;
    connect(autoUrl, token);
  } else {
    setStatus(false, "Manual");
    $("connPanel").classList.add("open");
  }

})();
</script>
</body>
</html>
